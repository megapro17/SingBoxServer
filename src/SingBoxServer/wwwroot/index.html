<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SingBox Config Editor</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-screen" class="screen">
        <div class="glass-card auth-card">
            <h2>Admin Login</h2>
            <input type="password" id="admin-token" placeholder="Enter Admin Token">
            <button id="btn-login" class="primary">Login</button>
            <div id="auth-error" class="error hidden"></div>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <header class="glass-header">
            <h1>SingBox Config Editor</h1>
            <div class="actions">
                <button id="btn-save" class="primary">Save Config</button>
                <button id="btn-logout" class="secondary">Logout</button>
            </div>
        </header>
        
        <main>
            <div class="tabs">
                <button class="tab active" data-target="tab-servers">Global Servers</button>
                <button class="tab" data-target="tab-users">Users</button>
                <button class="tab" data-target="tab-groups">Outbound Groups</button>
                <button class="tab" data-target="tab-links">Links</button>
                <button class="tab" data-target="tab-base">Base Config</button>
            </div>

            <div id="tab-servers" class="tab-content active">
                <div class="card-grid" id="servers-container"></div>
                <!-- <button id="btn-add-server" class="add-btn">+ Add Server</button> -->
            </div>

            <div id="tab-users" class="tab-content hidden">
                <div class="card-grid" id="users-container"></div>
                <button id="btn-add-user" class="add-btn">+ Add User</button>
            </div>

            <div id="tab-groups" class="tab-content hidden">
                <div class="card-grid" id="groups-container"></div>
                <button id="btn-add-group" class="add-btn">+ Add Group</button>
            </div>

            <div id="tab-links" class="tab-content hidden">
                <div class="item-card" style="width: 100%; max-width: none;">
                    <div class="card-header">
                        <h3>Subscription Links</h3>
                    </div>
                    <div class="form-group">
                        <textarea id="links-textarea" rows="20" style="width:100%; background:rgba(0,0,0,0.2); color:var(--text-color); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:8px; font-family:monospace; resize:vertical;" readonly></textarea>
                    </div>
                </div>
            </div>

            <div id="tab-base" class="tab-content hidden">
                <div class="glass-card" id="base-config-container">
                    <div class="form-group">
                        <label>Salt</label>
                        <input type="text" id="base-salt">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <input type="text" id="base-type">
                    </div>
                    <div class="form-group">
                        <label>Path</label>
                        <input type="text" id="base-path">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
